<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cetak E-Perjadin</title>
  <link rel="stylesheet" href="print_excel.css">
  <!-- ExcelJS browser -->
  <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
</head>
<body>
  <header>
    <h1>🖨️ Cetak Perjadin Anda</h1>
  </header>

  <main>
    <table id="printTable">
      <tbody></tbody>
    </table>

    <div class="btn-container">
      <button class="export-btn" id="exportBtn">📥 Cetak Excel</button>
    </div>
  </main>

  <footer>
    <p>BRMP Perkebunan - Kementerian Pertanian</p>
  </footer>

<script>
  let firstRow = null;
  const tbody = document.querySelector('#printTable tbody');

  // Ambil data dari database via Netlify function
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('/.netlify/functions/get-perjadin');
      const data = await res.json();
      if (!data.length) {
        tbody.innerHTML = '<tr><td>Data tidak ditemukan</td></tr>';
        return;
      }

      firstRow = data[0];
      tbody.innerHTML = `
        <tr><th>Nama</th><td>${firstRow.nama}</td></tr>
        <tr><th>Tujuan</th><td>${firstRow.tujuan}</td></tr>
        <tr><th>Tanggal</th><td>${new Date(firstRow.tanggal_berangkat).toLocaleDateString('id-ID')} - ${new Date(firstRow.tanggal_pulang).toLocaleDateString('id-ID')}</td></tr>
        <tr><th>Pejabat</th><td>${firstRow.pj_kegiatan}</td></tr>
        <tr><th>Catatan</th><td>${firstRow.maksud}</td></tr>
        <tr><th>Email Pengaju</th><td>${firstRow.email_user}</td></tr>
        <tr><th>Waktu Input</th><td>${new Date(firstRow.created_at).toLocaleString()}</td></tr>
      `;
    } catch (err) {
      tbody.innerHTML = '<tr><td>Gagal mengambil data</td></tr>';
      console.error(err);
    }
  });

  document.getElementById('exportBtn').addEventListener('click', async () => {
    if (!firstRow) return alert('Data belum siap.');

    try {
      // 1. Ambil template.xlsx dari public
      const resp = await fetch('/template.xlsx');
      const arrayBuffer = await resp.arrayBuffer();

      // 2. Load template ke workbook
      const workbook = new ExcelJS.Workbook();
      await workbook.xlsx.load(arrayBuffer);

      // 3. Ambil sheet pertama
      const ws = workbook.worksheets[0]; // worksheet pertama

      // 4. Masukkan data sesuai template
      // (contoh: isi sel A2, B2 dst. sesuaikan dengan template.xlsx kamu)
      ws.getCell('B14').value = firstRow.nama;
      ws.getCell('D26').value = firstRow.tujuan;
      ws.getCell('D29').value = `${new Date(firstRow.tanggal_berangkat).toLocaleDateString('id-ID')} - ${new Date(firstRow.tanggal_pulang).toLocaleDateString('id-ID')}`;
      ws.getCell('E38').value = firstRow.pj_kegiatan;
      ws.getCell('E2').value = firstRow.maksud;
      ws.getCell('F14').value = firstRow.email_user;
      ws.getCell('G2').value = new Date(firstRow.created_at).toLocaleString();

      // 5. Download file hasilnya
      const buffer = await workbook.xlsx.writeBuffer();
      const blob = new Blob([buffer], {type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'perjadin.xlsx';
      link.click();
    } catch (err) {
      console.error('Gagal generate Excel', err);
      alert('Gagal generate Excel');
    }
  });
</script>

</body>
</html>
