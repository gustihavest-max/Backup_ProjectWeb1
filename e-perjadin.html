<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajukan E-Perjadin</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/airbnb.css" />
  <link rel="stylesheet" href="e-perjadin.css" />
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>

<body>

<div id="notifBanner" class="notif-popup">
  <div id="notifContent" class="popup-content">
    <div id="notifIcon" class="popup-icon">✔️</div>
    <div id="notifTitle" class="popup-title">Sukses</div>
    <p id="notifMessage" class="popup-message"></p>
  </div>
</div>

<header class="navbar">
  <a href="https://perkebunan.brmp.pertanian.go.id/" class="navbar-brand" target="_blank">
    <img src="img/Logo-Kementan.png" alt="Logo" />
    BRMP PERKEBUNAN
  </a>
  <nav class="navbar-nav">
    <span id="userDisplay"></span>
    <a href="dashboard.html" class="dashboard-btn">⬅️ Dashboard</a>
  </nav>
</header>

<main class="form-container">
  <h2 class="form-title">Ajukan E-Perjadin 📝</h2>

  <form id="perjadinForm">
    <h3>Data Pegawai</h3>
    <div id="pegawaiWrapper">
      <div class="pegawai-group">
        <label>Nama Pegawai</label>
        <select class="nama-select-field" name="nama[]" required style="width:100%"></select>

        <label>Golongan</label>
        <input type="text" class="golongan-select-field" name="golongan[]" readonly placeholder="Otomatis..." required style="background: #f4f4f4;" />

        <label>Jabatan</label>
        <input type="text" class="jabatan-input-field" name="jabatan[]" readonly placeholder="Otomatis..." required style="background: #f4f4f4;" />
      </div>
    </div>

    <button type="button" id="addPegawaiBtn">➕ Tambah Pegawai</button>

    <hr />
    <h3>Detail Perjalanan Dinas</h3>
    <label>Tujuan</label>
    <input type="text" id="tujuan" required />

    <label>Maksud</label>
    <textarea id="maksud" required></textarea>

    <label>Tanggal Berangkat</label>
    <input type="text" id="tanggalBerangkat" class="date-picker" />

    <label>Tanggal Pulang</label>
    <input type="text" id="tanggalPulang" class="date-picker" />

    <label>Lama Perjalanan</label>
    <input type="text" id="lamaPerjalanan" readonly />

    <label>Kendaraan</label>
    <input type="text" id="kendaraan" />

    <hr />
    <label>Kode Kegiatan</label>
    <select id="kodeKegiatan"></select>

    <label>Sisa Anggaran</label>
    <input type="text" id="sisaAnggaran" readonly />

    <label>Rencana Biaya</label>
    <input type="text" id="rencanaBiayaTotal" />

    <button type="submit" id="submitBtn">💾 Simpan</button>
  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
/* =========================
   SELECT2 PEGAWAI (FIXED)
========================= */
function initSelectPegawai(el) {
  $(el).select2({
    placeholder: "🔍 Cari nama pegawai...",
    minimumInputLength: 1,
    allowClear: true,
    ajax: {
      url: "/.netlify/functions/pegawai_bun",
      type: "POST",
      dataType: 'json',
      contentType: "application/json",
      delay: 250,
      data: params => JSON.stringify({ search: params.term || "", page: 1, limit: 10 }),
      processResults: data => {
        if (!data.rows) return { results: [] };
        return {
          results: data.rows.map(item => ({
            id: item.nama_pegawai,
            text: item.nama_pegawai,
            jabatan: item.jabatan,
            golongan: item.golongan
          }))
        };
      }
    }
  });

  $(el).on("select2:select", function (e) {
    const data = e.params.data;
    const group = this.closest(".pegawai-group");

    // 🔥 Mengisi field otomatis
    group.querySelector(".jabatan-input-field").value = data.jabatan || "-";
    group.querySelector(".golongan-select-field").value = data.golongan || "-";
  });
}

/* INIT LOAD */
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".nama-select-field").forEach(el => initSelectPegawai(el));
  
  // Flatpickr & Hitung Hari
  const fpB = flatpickr("#tanggalBerangkat", { onChange: hitungLama });
  const fpP = flatpickr("#tanggalPulang", { onChange: hitungLama });
});

function hitungLama() {
  const t1 = new Date(document.getElementById("tanggalBerangkat").value);
  const t2 = new Date(document.getElementById("tanggalPulang").value);
  if (t1 && t2 && t2 >= t1) {
    const diff = Math.ceil((t2 - t1) / (1000 * 60 * 60 * 24)) + 1;
    document.getElementById("lamaPerjalanan").value = diff + " Hari";
  }
}

/* TAMBAH BARIS PEGAWAI */
document.getElementById("addPegawaiBtn").addEventListener("click", () => {
  const div = document.createElement("div");
  div.className = "pegawai-group";
  div.style.marginTop = "15px";
  div.innerHTML = `
    <hr style="border-top: 1px dashed #ccc;">
    <label>Nama Pegawai</label>
    <select class="nama-select-field" name="nama[]" required style="width:100%"></select>
    <label>Golongan</label>
    <input type="text" class="golongan-select-field" name="golongan[]" readonly placeholder="Otomatis..." required style="background: #f4f4f4;" />
    <label>Jabatan</label>
    <input type="text" class="jabatan-input-field" name="jabatan[]" readonly placeholder="Otomatis..." required style="background: #f4f4f4;" />
  `;
  document.getElementById("pegawaiWrapper").appendChild(div);
  initSelectPegawai(div.querySelector(".nama-select-field"));
});

/* SUBMIT FORM */
document.getElementById("perjadinForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const names = [...document.querySelectorAll(".nama-select-field")].map(el => el.value);
  const gol = [...document.querySelectorAll(".golongan-select-field")].map(el => el.value);
  const jab = [...document.querySelectorAll(".jabatan-input-field")].map(el => el.value);

  const allPegawai = names.map((n, i) => ({ nama: n, golongan: gol[i], jabatan: jab[i] }));

  const body = {
    email_user: localStorage.getItem("loggedInUser"),
    allPegawai,
    tujuan: document.getElementById("tujuan").value,
    maksud: document.getElementById("maksud").value,
    tanggal_berangkat: document.getElementById("tanggalBerangkat").value,
    tanggal_pulang: document.getElementById("tanggalPulang").value,
    lama_perjalanan: document.getElementById("lamaPerjalanan").value,
    kendaraan: document.getElementById("kendaraan").value,
    kode_kegiatan: document.getElementById("kodeKegiatan").value
  };

  const res = await fetch("/.netlify/functions/simpan-perjadin", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  const result = await res.json();
  alert(result.message);
  if(result.success) location.reload();
});
</script>
</body>
</html>
