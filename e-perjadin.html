<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajukan E-Perjadin</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/airbnb.css" />
  <link rel="stylesheet" href="e-perjadin.css" />
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>

<body>

<div id="notifBanner" class="notif-popup">
  <div id="notifContent" class="popup-content">
    <div id="notifIcon" class="popup-icon">✔️</div>
    <div id="notifTitle" class="popup-title">Sukses</div>
    <p id="notifMessage" class="popup-message"></p>
  </div>
</div>

<header class="navbar">
  <a href="https://perkebunan.brmp.pertanian.go.id/" class="navbar-brand" target="_blank">
    <img src="img/Logo-Kementan.png" alt="Logo" />
    BRMP PERKEBUNAN
  </a>
  <nav class="navbar-nav">
    <span id="userDisplay"></span>
    <a href="dashboard.html" class="dashboard-btn">⬅️ Dashboard</a>
  </nav>
</header>

<main class="form-container">
  <h2 class="form-title">Ajukan E-Perjadin 📝</h2>

  <form id="perjadinForm">
    <h3>Data Pegawai</h3>
    <div id="pegawaiWrapper">
      <div class="pegawai-group">
        <label>Nama Pegawai</label>
        <select class="nama-select-field" name="nama[]" required style="width:100%"></select>

        <label>Golongan</label>
        <input type="text" class="golongan-select-field" name="golongan[]" readonly placeholder="Otomatis..." required style="background: #f4f4f4;" />

        <label>Jabatan</label>
        <input type="text" class="jabatan-input-field" name="jabatan[]" readonly placeholder="Otomatis..." required style="background: #f4f4f4;" />
      </div>
    </div>

    <button type="button" id="addPegawaiBtn">➕ Tambah Pegawai</button>

    <hr />
    <h3>Detail Perjalanan Dinas</h3>
    <label>Tujuan</label>
    <input type="text" id="tujuan" required />

    <label>Maksud</label>
    <textarea id="maksud" required></textarea>

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Tanggal Berangkat</label>
            <input type="text" id="tanggalBerangkat" class="date-picker" required />
        </div>
        <div style="flex: 1;">
            <label>Tanggal Pulang</label>
            <input type="text" id="tanggalPulang" class="date-picker" required />
        </div>
    </div>

    <label>Lama Perjalanan</label>
    <input type="text" id="lamaPerjalanan" readonly style="background: #f4f4f4;" />

    <label>Kendaraan</label>
    <input type="text" id="kendaraan" required />

    <hr />
    <h3>Anggaran & Kegiatan</h3>
    
    <label>Pilih Kode Kegiatan (MAK)</label>
    <select id="kodeKegiatan" required style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        <option value="">-- Memuat Kode Kegiatan... --</option>
    </select>

    <label>Penanggung Jawab Kegiatan</label>
    <input type="text" id="pjKegiatan" readonly placeholder="Terisi otomatis..." style="background: #f4f4f4;" />

    <label>Sisa Anggaran (Rp)</label>
    <input type="text" id="sisaAnggaran" readonly placeholder="Terisi otomatis..." style="background: #f4f4f4; font-weight: bold; color: #2c3e50;" />

    <label>Rencana Biaya (Angka Saja)</label>
    <input type="number" id="rencanaBiayaTotal" placeholder="Contoh: 1500000" required />

    <button type="submit" id="submitBtn">💾 Simpan Pengajuan</button>
  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
/* =========================
   1. SELECT2 PEGAWAI
========================= */
function initSelectPegawai(el) {
  $(el).select2({
    placeholder: "🔍 Cari nama pegawai...",
    minimumInputLength: 1,
    allowClear: true,
    ajax: {
      url: "/.netlify/functions/pegawai_bun",
      type: "POST",
      dataType: 'json',
      contentType: "application/json",
      delay: 250,
      data: params => JSON.stringify({ search: params.term || "", page: 1, limit: 10 }),
      processResults: data => {
        if (!data.rows) return { results: [] };
        return {
          results: data.rows.map(item => ({
            id: item.nama_pegawai,
            text: item.nama_pegawai,
            jabatan: item.jabatan,
            golongan: item.golongan
          }))
        };
      }
    }
  });

  $(el).on("select2:select", function (e) {
    const data = e.params.data;
    const group = this.closest(".pegawai-group");
    group.querySelector(".jabatan-input-field").value = data.jabatan || "-";
    group.querySelector(".golongan-select-field").value = data.golongan || "-";
  });
}

/* =========================
   2. FUNGSI ANGGARAN (NEW)
========================= */
// Global data untuk menyimpan detail anggaran
let dataAnggaranGlobal = [];

async function fetchDaftarAnggaran() {
  try {
    const res = await fetch("/.netlify/functions/anggaran", {
      method: "POST",
      body: JSON.stringify({ action: "getAll" })
    });
    const result = await res.json();
    
    if (result.success) {
      dataAnggaranGlobal = result.data;
      const select = document.getElementById("kodeKegiatan");
      select.innerHTML = '<option value="">-- Pilih Kode Kegiatan --</option>';
      
      dataAnggaranGlobal.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.kode_kegiatan;
        opt.textContent = `${item.kode_kegiatan} - ${item.pj_kegiatan}`;
        select.appendChild(opt);
      });
    }
  } catch (err) {
    console.error("Gagal memuat anggaran:", err);
  }
}

// Event saat Kode Kegiatan dipilih
document.getElementById("kodeKegiatan").addEventListener("change", function() {
  const selectedKode = this.value;
  const find = dataAnggaranGlobal.find(a => a.kode_kegiatan === selectedKode);
  
  if (find) {
    document.getElementById("pjKegiatan").value = find.pj_kegiatan || "-";
    // Format Rupiah sederhana
    const formatter = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' });
    document.getElementById("sisaAnggaran").value = formatter.format(find.sisa_anggaran);
  } else {
    document.getElementById("pjKegiatan").value = "";
    document.getElementById("sisaAnggaran").value = "";
  }
});

/* =========================
   3. INIT & HELPER
========================= */
document.addEventListener("DOMContentLoaded", () => {
  const user = localStorage.getItem("loggedInUser");
  if(user) document.getElementById("userDisplay").textContent = "👤 " + user;

  document.querySelectorAll(".nama-select-field").forEach(el => initSelectPegawai(el));
  
  // Ambil data anggaran dari database
  fetchDaftarAnggaran();

  // Flatpickr
  flatpickr(".date-picker", { 
    altInput: true, 
    altFormat: "d-m-Y", 
    dateFormat: "Y-m-d",
    onChange: hitungLama 
  });
});

function hitungLama() {
  const d1 = document.getElementById("tanggalBerangkat").value;
  const d2 = document.getElementById("tanggalPulang").value;
  if (d1 && d2) {
    const t1 = new Date(d1);
    const t2 = new Date(d2);
    if (t2 >= t1) {
      const diff = Math.ceil((t2 - t1) / (1000 * 60 * 60 * 24)) + 1;
      document.getElementById("lamaPerjalanan").value = diff + " Hari";
    }
  }
}

document.getElementById("addPegawaiBtn").addEventListener("click", () => {
  const div = document.createElement("div");
  div.className = "pegawai-group";
  div.style.marginTop = "15px";
  div.innerHTML = `
    <hr style="border-top: 1px dashed #ccc;">
    <label>Nama Pegawai</label>
    <select class="nama-select-field" name="nama[]" required style="width:100%"></select>
    <label>Golongan</label>
    <input type="text" class="golongan-select-field" name="golongan[]" readonly placeholder="Otomatis..." required style="background: #f4f4f4;" />
    <label>Jabatan</label>
    <input type="text" class="jabatan-input-field" name="jabatan[]" readonly placeholder="Otomatis..." required style="background: #f4f4f4;" />
  `;
  document.getElementById("pegawaiWrapper").appendChild(div);
  initSelectPegawai(div.querySelector(".nama-select-field"));
});

/* =========================
   4. SUBMIT (FIXED)
========================= */
document.getElementById("perjadinForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  
  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = true;
  submitBtn.textContent = "⏳ Menyimpan...";

  const names = [...document.querySelectorAll(".nama-select-field")].map(el => el.value);
  const gol = [...document.querySelectorAll(".golongan-select-field")].map(el => el.value);
  const jab = [...document.querySelectorAll(".jabatan-input-field")].map(el => el.value);

  const allPegawai = names.map((n, i) => ({ nama: n, golongan: gol[i], jabatan: jab[i] }));

  const body = {
    email_user: localStorage.getItem("loggedInUser"),
    allPegawai,
    tujuan: document.getElementById("tujuan").value,
    maksud: document.getElementById("maksud").value,
    tanggal_berangkat: document.getElementById("tanggalBerangkat").value,
    tanggal_pulang: document.getElementById("tanggalPulang").value,
    lama_perjalanan: document.getElementById("lamaPerjalanan").value,
    kendaraan: document.getElementById("kendaraan").value,
    kode_kegiatan: document.getElementById("kodeKegiatan").value,
    pj_kegiatan: document.getElementById("pjKegiatan").value,
    rencanabiaya: document.getElementById("rencanaBiayaTotal").value
  };

  try {
    const res = await fetch("/.netlify/functions/simpan-perjadin", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    const result = await res.json();
    alert(result.message);
    if(result.success) location.href = "dashboard.html";
  } catch (err) {
    alert("Terjadi kesalahan server");
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "💾 Simpan Pengajuan";
  }
});
</script>
</body>
</html>
