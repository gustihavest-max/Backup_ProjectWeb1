<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajukan E-Perjadin</title>

  <!-- ORIGINAL -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/airbnb.css" />
  <link rel="stylesheet" href="e-perjadin.css" />

  <!-- 🔥 SELECT2 -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>

<body>

<div id="notifBanner" class="notif-popup">
  <div id="notifContent" class="popup-content">
    <div id="notifIcon" class="popup-icon">✔️</div>
    <div id="notifTitle" class="popup-title">Sukses</div>
    <p id="notifMessage" class="popup-message"></p>
  </div>
</div>

<header class="navbar">
  <a href="https://perkebunan.brmp.pertanian.go.id/" class="navbar-brand" target="_blank">
    <img src="img/Logo-Kementan.png" alt="Logo" />
    BRMP PERKEBUNAN
  </a>

  <nav class="navbar-nav">
    <span id="userDisplay"></span>
    <a href="dashboard.html" class="dashboard-btn">⬅️ Dashboard</a>
  </nav>
</header>

<main class="form-container">
  <h2 class="form-title">Ajukan E-Perjadin 📝</h2>

  <form id="perjadinForm">

    <h3>Data Pegawai</h3>

    <div id="pegawaiWrapper">
      <div class="pegawai-group">

        <label>Nama Pegawai</label>
        <!-- 🔥 UBAH KE SELECT2 -->
        <select class="nama-select-field" name="nama[]" required style="width:100%"></select>

        <label>Golongan</label>
        <select class="golongan-select-field" name="golongan[]" required>
          <option value="">-- Pilih Golongan --</option>
          <option value="Golongan IIa">IIa / 2a</option>
          <option value="Golongan IIb">IIb / 2b</option>
          <option value="Golongan IIc">IIc / 2c</option>
          <option value="Golongan IId">IId / 2d</option>
          <option value="Golongan IIIa">IIIa / 3a</option>
          <option value="Golongan IIIb">IIIb / 3b</option>
          <option value="Golongan IIIc">IIIc / 3c</option>
          <option value="Golongan IIId">IIId / 3d</option>
          <option value="Golongan IVa">IVa / 4a</option>
          <option value="Golongan IVb">IVb / 4b</option>
          <option value="Golongan IVc">IVc / 4c</option>
          <option value="Golongan IVd">IVd / 4d</option>
        </select>

        <label>Jabatan</label>
        <input type="text" class="jabatan-input-field" name="jabatan[]" required />

      </div>
    </div>

    <button type="button" id="addPegawaiBtn">➕ Tambah Pegawai</button>

    <hr />

    <h3>Detail Perjalanan Dinas</h3>

    <label>Tujuan</label>
    <input type="text" id="tujuan" required />

    <label>Maksud</label>
    <textarea id="maksud" required></textarea>

    <label>Tanggal Berangkat</label>
    <input type="text" id="tanggalBerangkat" class="date-picker" />

    <label>Tanggal Pulang</label>
    <input type="text" id="tanggalPulang" class="date-picker" />

    <label>Lama Perjalanan</label>
    <input type="text" id="lamaPerjalanan" readonly />

    <label>Kendaraan</label>
    <input type="text" id="kendaraan" />

    <hr />

    <label>Kode Kegiatan</label>
    <select id="kodeKegiatan"></select>

    <label>Sisa Anggaran</label>
    <input type="text" id="sisaAnggaran" readonly />

    <label>Rencana Biaya</label>
    <input type="text" id="rencanaBiayaTotal" />

    <button type="submit" id="submitBtn">💾 Simpan</button>

  </form>
</main>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

/* =========================
   SELECT2 PEGAWAI
========================= */
function initSelectPegawai(el) {
  $(el).select2({
    placeholder: "🔍 Cari nama pegawai...",
    minimumInputLength: 1,
    allowClear: true,
    ajax: {
      url: "/.netlify/functions/pegawai_bun", // 💡 Pastikan nama file di folder functions adalah pegawai_bun.js
      type: "POST",
      dataType: 'json',
      contentType: "application/json",
      delay: 250,
      data: function (params) {
        return JSON.stringify({
          search: params.term, // Kata kunci pencarian
          page: 1,
          limit: 10
        });
      },
      processResults: function (data) {
        console.log("Data dari server:", data); // 💡 CEK DI CONSOLE F12
        
        // Pastikan data.rows ada (sesuai backend Anda)
        if (!data.rows) return { results: [] };

        return {
          results: data.rows.map(item => ({
            id: item.nama_pegawai,   // Ini yang akan disimpan di value select
            text: item.nama_pegawai, // Ini yang tampil di dropdown
            jabatan: item.jabatan,
            golongan: item.golongan
          }))
        };
      },
      cache: true
    }
  });

  // Event saat nama dipilih
  $(el).on("select2:select", function (e) {
    const data = e.params.data;
    const group = this.closest(".pegawai-group");

    // Isi otomatis field lainnya
    const jabatanField = group.querySelector(".jabatan-input-field");
    const golonganField = group.querySelector(".golongan-select-field");

    if (jabatanField) jabatanField.value = data.jabatan || "";
    if (golonganField) {
        golonganField.value = data.golongan;
        // Trigger change agar jika ada validasi lain ikut terbaca
        $(golonganField).trigger('change'); 
    }
  });
}

/* INIT */
document.addEventListener("DOMContentLoaded", () => {

  document.querySelectorAll(".nama-select-field").forEach(el => {
    initSelectPegawai(el);
  });

});

/* TAMBAH PEGAWAI */
document.getElementById("addPegawaiBtn").addEventListener("click", () => {

  const div = document.createElement("div");
  div.className = "pegawai-group";

  div.innerHTML = `
    <hr>
    <label>Nama Pegawai</label>
    <select class="nama-select-field" name="nama[]" required style="width:100%"></select>

    <label>Golongan</label>
    <select class="golongan-select-field" name="golongan[]" required>
      <option value="">-- Pilih Golongan --</option>
      <option value="Golongan IIIa">IIIa</option>
      <option value="Golongan IIIb">IIIb</option>
      <option value="Golongan IVa">IVa</option>
    </select>

    <label>Jabatan</label>
    <input type="text" class="jabatan-input-field" name="jabatan[]" required />
  `;

  document.getElementById("pegawaiWrapper").appendChild(div);

  initSelectPegawai(div.querySelector(".nama-select-field"));
});

/* SUBMIT */
document.getElementById("perjadinForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const names = [...document.querySelectorAll(".nama-select-field")]
    .map(el => el.value);

  const gol = [...document.querySelectorAll(".golongan-select-field")]
    .map(el => el.value);

  const jab = [...document.querySelectorAll(".jabatan-input-field")]
    .map(el => el.value);

  const allPegawai = names.map((n, i) => ({
    nama: n,
    golongan: gol[i],
    jabatan: jab[i]
  }));

  const body = {
    email_user: localStorage.getItem("loggedInUser"),
    allPegawai,
    tujuan: document.getElementById("tujuan").value,
    maksud: document.getElementById("maksud").value,
    tanggal_berangkat: document.getElementById("tanggalBerangkat").value,
    tanggal_pulang: document.getElementById("tanggalPulang").value,
    lama_perjalanan: document.getElementById("lamaPerjalanan").value,
    kendaraan: document.getElementById("kendaraan").value,
    rencanabiaya: 0,
    kode_kegiatan: document.getElementById("kodeKegiatan").value
  };

  const res = await fetch("/.netlify/functions/simpan-perjadin", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  const result = await res.json();

  alert(result.message);
});

</script>

</body>
</html>
