<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajukan E-Perjadin</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/airbnb.css" />
  <link rel="stylesheet" href="e-perjadin.css" />
</head>
<body>

<div id="notifBanner" class="notif-popup">
  <div id="notifContent" class="popup-content">
    <div id="notifIcon" class="popup-icon">✔️</div>
    <div id="notifTitle" class="popup-title">Sukses</div>
    <p id="notifMessage" class="popup-message"></p>
  </div>
</div>

<header class="navbar">
  <a href="https://perkebunan.brmp.pertanian.go.id/" class="navbar-brand" target="_blank">
    <img src="img/Logo-Kementan.png" alt="Logo" />
    BRMP PERKEBUNAN
  </a>
  <nav class="navbar-nav">
    <span id="userDisplay"></span>
    <a href="dashboard.html" class="dashboard-btn">⬅️ Dashboard</a>
  </nav>
</header>

<main class="form-container">
  <h2 class="form-title">Ajukan E-Perjadin 📝</h2>

  <form id="perjadinForm">
    <h3>Data Pegawai</h3>
    <div id="pegawaiWrapper">
      </div>

    <datalist id="listPegawaiMaster"></datalist>

    <button type="button" id="addPegawaiBtn" style="margin-top: 10px;">➕ Tambah Pegawai</button>

    <hr />
    <h3>Detail Perjalanan Dinas</h3>
    <label>Tujuan</label>
    <input type="text" id="tujuan" required />

    <label>Maksud Perjalanan</label>
    <textarea id="maksud" rows="4" required></textarea>

    <label>Tanggal Berangkat</label>
    <div class="date-wrapper">
      <input type="text" id="tanggalBerangkat" class="date-picker" required />
      <span class="calendar-icon">📅</span>
    </div>

    <label>Tanggal Pulang</label>
    <div class="date-wrapper">
      <input type="text" id="tanggalPulang" class="date-picker" required />
      <span class="calendar-icon">📅</span>
    </div>

    <label>Lama Perjalanan</label>
    <input type="text" id="lamaPerjalanan" readonly />

    <label>Kendaraan</label>
    <input type="text" id="kendaraan" required />

    <hr />
    <h3>Penanggung Jawab</h3>
    <input type="text" id="pjKegiatan" readonly required style="background:#f0f0f0;">

    <hr />
    <h3>Kode Kegiatan / MAK</h3>
    <label>Pilih Kode Kegiatan</label>
    <select id="kodeKegiatan" required>
      <option value="">-- Pilih Kode Kegiatan --</option>
    </select>

    <hr />
    <label>Sisa Anggaran</label>
    <input type="text" id="sisaAnggaran" readonly style="background:#f0f0f0;">

    <label>Rencana Biaya Total (angka)</label>
    <input type="text" id="rencanaBiayaTotal" placeholder="Masukkan total biaya" required />

    <hr />
    <h3>Upload Dokumen</h3>
    <label>Upload Rencana Biaya (PDF)</label>
    <input type="file" id="urlBiaya" accept=".pdf" required />

    <label>Upload Data Dukung (PDF)</label>
    <input type="file" id="urlDukung" accept=".pdf" required />

    <div id="uploadLoader" style="display:none; text-align:center;">
      <div class="progress-ring"></div>
      <div class="upload-text">Mengupload ke Cloudinary & Database...</div>
    </div>

    <button type="submit" id="submitBtn">💾 Simpan Data</button>
  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
  /* =============================================================
     1️⃣ VARIABEL GLOBAL & STATE
     ============================================================= */
  const pegawaiWrapper = document.getElementById("pegawaiWrapper");
  const addPegawaiBtn = document.getElementById("addPegawaiBtn");
  const listPegawaiMaster = document.getElementById("listPegawaiMaster");
  const notifBanner = document.getElementById("notifBanner");
  const notifMessage = document.getElementById("notifMessage");
  let daftarPegawai = []; // Menyimpan data dari tabel pegawai_bun
  let notifTimeout;

  /* =============================================================
     2️⃣ FUNGSI NOTIFIKASI
     ============================================================= */
  function showNotification(message, type = "success", duration = 5000) {
    clearTimeout(notifTimeout);
    notifBanner.className = `notif-popup show ${type}`;
    const notifIcon = document.getElementById("notifIcon");
    const notifTitle = document.getElementById("notifTitle");

    if (type === "success") {
      notifIcon.textContent = "✔️";
      notifTitle.textContent = "Berhasil";
    } else {
      notifIcon.textContent = "❌";
      notifTitle.textContent = "Gagal";
    }

    notifMessage.innerHTML = message;
    notifTimeout = setTimeout(() => notifBanner.classList.remove("show"), duration);
  }

  /* =============================================================
     3️⃣ LOAD DATA MASTER PEGAWAI DARI BACKEND
     ============================================================= */
  async function fetchMasterPegawai() {
    try {
      const res = await fetch("/.netlify/functions/pegawai-bun", {
        method: "POST",
        body: JSON.stringify({ limit: 500 }) // Ambil data cukup banyak
      });
      const result = await res.json();
      if (result.success) {
        daftarPegawai = result.rows;
        // Isi datalist untuk autocomplete
        listPegawaiMaster.innerHTML = daftarPegawai.map(p => `<option value="${p.nama_pegawai}">`).join('');
      }
    } catch (err) {
      console.error("Gagal load data pegawai:", err);
    }
  }

  /* =============================================================
     4️⃣ FUNGSI MANAJEMEN INPUT PEGAWAI
     ============================================================= */
  function createPegawaiInputGroup() {
    const div = document.createElement("div");
    div.className = "pegawai-group row-add-animation";
    
    div.innerHTML = `
      <hr style="border-top:1px dashed #ccc; margin:10px 0;">
      <label class="pegawai-label">Nama Pegawai</label>
      <input type="text" class="nama-input-field" name="nama[]" list="listPegawaiMaster" placeholder="Cari nama pegawai..." required />

      <label>Golongan</label>
      <input type="text" class="golongan-select-field" name="golongan[]" readonly style="background:#f9f9f9;" required />

      <label>Jabatan</label>
      <input type="text" class="jabatan-input-field" name="jabatan[]" readonly style="background:#f9f9f9;" required />

      <button type="button" class="removePegawaiBtn" style="background:#dc3545;color:white;padding:6px 10px;border:none;border-radius:4px;margin-top:10px;display:none;">
        🗑️ Hapus Pegawai
      </button>
    `;

    const nameInput = div.querySelector(".nama-input-field");
    const golInput = div.querySelector(".golongan-select-field");
    const jabInput = div.querySelector(".jabatan-input-field");
    const removeBtn = div.querySelector(".removePegawaiBtn");

    // Logika Autocomplete Fill
    nameInput.addEventListener("input", (e) => {
      const val = e.target.value;
      const find = daftarPegawai.find(p => p.nama_pegawai === val);
      if (find) {
        golInput.value = find.golongan;
        jabInput.value = find.jabatan;
      } else {
        golInput.value = "";
        jabInput.value = "";
      }
    });

    removeBtn.addEventListener("click", () => {
      div.remove();
      updatePegawaiLabels();
    });

    return div;
  }

  function updatePegawaiLabels() {
    const groups = pegawaiWrapper.querySelectorAll(".pegawai-group");
    groups.forEach((group, index) => {
      group.querySelector(".pegawai-label").textContent = index === 0 ? "Nama Pegawai" : `Nama Pegawai ke-${index + 1}`;
      group.querySelector(".removePegawaiBtn").style.display = index === 0 ? "none" : "block";
    });
  }

  addPegawaiBtn.addEventListener("click", () => {
    pegawaiWrapper.appendChild(createPegawaiInputGroup());
    updatePegawaiLabels();
  });

  /* =============================================================
     5️⃣ LOGIKA FORM & HITUNGAN
     ============================================================= */
  flatpickr(".date-picker", { altInput: true, altFormat: "d-m-Y", dateFormat: "Y-m-d" });

  const tglB = document.getElementById("tanggalBerangkat");
  const tglP = document.getElementById("tanggalPulang");
  const lama = document.getElementById("lamaPerjalanan");

  function hitungLama() {
    const t1 = tglB.value ? new Date(tglB.value) : null;
    const t2 = tglP.value ? new Date(tglP.value) : null;
    if (t1 && t2 && t2 >= t1) {
      const days = ((t2 - t1) / (1000 * 60 * 60 * 24)) + 1;
      lama.value = `${days} hari`;
    } else {
      lama.value = "";
    }
  }
  tglB.addEventListener("change", hitungLama);
  tglP.addEventListener("change", hitungLama);

  const biayaInput = document.getElementById("rencanaBiayaTotal");
  const formatRupiah = (val) => val.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  const unformat = (val) => val.replace(/\./g, "");

  biayaInput.addEventListener("input", (e) => {
    let clean = unformat(e.target.value);
    if (!clean) { e.target.value = ""; return; }
    e.target.value = formatRupiah(parseInt(clean).toString());
  });

  /* =============================================================
     6️⃣ LOAD KODE KEGIATAN & ANGGARAN
     ============================================================= */
  async function loadKodeKegiatan() {
    try {
      const res = await fetch("/.netlify/functions/anggaran", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "getAll" })
      });
      const result = await res.json();
      if (result.success) {
        const select = document.getElementById("kodeKegiatan");
        result.data.forEach(item => {
          const opt = document.createElement("option");
          opt.value = item.kode_kegiatan;
          opt.textContent = item.kode_kegiatan;
          select.appendChild(opt);
        });
      }
    } catch (err) {
      showNotification("Gagal memuat kode kegiatan", "error");
    }
  }

  document.getElementById("kodeKegiatan").addEventListener("change", async (e) => {
    const kode = e.target.value;
    if (!kode) return;
    try {
      const res = await fetch("/.netlify/functions/anggaran", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "getByKode", kode_kegiatan: kode })
      });
      const result = await res.json();
      if (result.success) {
        document.getElementById("sisaAnggaran").value = formatRupiah(String(result.data.sisa_anggaran));
        document.getElementById("pjKegiatan").value = result.data.pj_kegiatan || "";
      }
    } catch (err) {
      showNotification("Gagal ambil sisa anggaran", "error");
    }
  });

  /* =============================================================
     7️⃣ SUBMIT & UPLOAD
     ============================================================= */
  async function uploadPDF(file) {
    if (!file) return "";
    document.getElementById("uploadLoader").style.display = "block";
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "pdfbun");
    const res = await fetch(`https://api.cloudinary.com/v1_1/ddbeawzos/auto/upload`, { method: "POST", body: formData });
    const data = await res.json();
    document.getElementById("uploadLoader").style.display = "none";
    return data.secure_url;
  }

  document.getElementById("perjadinForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "⏳ Memproses...";

    try {
      const user = localStorage.getItem("loggedInUser");
      const names = [...document.querySelectorAll(".nama-input-field")].map(a => a.value);
      const gol = [...document.querySelectorAll(".golongan-select-field")].map(a => a.value);
      const jab = [...document.querySelectorAll(".jabatan-input-field")].map(a => a.value);

      const allPegawai = names.map((n, i) => ({ nama: n, golongan: gol[i], jabatan: jab[i] }));
      const renBiaya = parseInt(unformat(biayaInput.value));
      const sisa = parseInt(unformat(document.getElementById("sisaAnggaran").value));

      if (renBiaya > sisa) throw new Error("Anggaran tidak mencukupi!");

      const [url1, url2] = await Promise.all([
        uploadPDF(document.getElementById("urlBiaya").files[0]),
        uploadPDF(document.getElementById("urlDukung").files[0])
      ]);

      const body = {
        email_user: user,
        allPegawai,
        tujuan: document.getElementById("tujuan").value,
        maksud: document.getElementById("maksud").value,
        tanggal_berangkat: tglB.value,
        tanggal_pulang: tglP.value,
        lama_perjalanan: lama.value,
        kendaraan: document.getElementById("kendaraan").value,
        pj_kegiatan: document.getElementById("pjKegiatan").value,
        kode_kegiatan: document.getElementById("kodeKegiatan").value,
        rencanabiaya: renBiaya,
        urlbiaya: url1,
        urldatadukung: url2
      };

      const res = await fetch("/.netlify/functions/simpan-perjadin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const resJson = await res.json();
      if (!resJson.success) throw new Error(resJson.message);

      showNotification("Pengajuan Berhasil Disimpan!", "success");
      setTimeout(() => location.href = "riwayat_perjadin.html", 2000);
    } catch (err) {
      showNotification(err.message, "error");
      btn.disabled = false;
      btn.textContent = "💾 Simpan Data";
    }
  });

  /* =============================================================
     8️⃣ INIT ON LOAD
     ============================================================= */
  document.addEventListener("DOMContentLoaded", async () => {
    const user = localStorage.getItem("loggedInUser");
    if (!user) { location.href = "index.html"; return; }
    document.getElementById("userDisplay").textContent = "👤 " + user;

    await fetchMasterPegawai();
    pegawaiWrapper.appendChild(createPegawaiInputGroup()); // Tambah baris pertama
    updatePegawaiLabels();
    loadKodeKegiatan();
  });
</script>

</body>
</html>
