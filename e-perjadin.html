<main class="form-container">
  <h2 class="form-title">Ajukan E-Perjadin 📝</h2>
  <form id="perjadinForm">
    <h3>Data Pegawai</h3>
    <div id="pegawaiWrapper">
      <div class="pegawai-group">
        <label>Nama Pegawai</label>
        <input type="text" class="nama-input-field" list="listPegawai" placeholder="Cari nama pegawai..." required autocomplete="off">
        <datalist id="listPegawai"></datalist>

        <label>Golongan</label>
        <input type="text" class="golongan-field" readonly style="background:#f0f0f0;">

        <label>Jabatan</label>
        <input type="text" class="jabatan-field" readonly style="background:#f0f0f0;">
      </div>
    </div>
    <button type="button" id="addPegawaiBtn" style="margin-top: 10px;">➕ Tambah Pegawai</button>

    <hr />
    <h3>Detail Perjalanan</h3>
    <h3>Anggaran & Penanggung Jawab</h3>
    <label>Pilih Kode Kegiatan</label>
    <select id="kodeKegiatan" required>
      <option value="">-- Pilih Kode Kegiatan --</option>
    </select>

    <label>Penanggung Jawab</label>
    <input type="text" id="pjKegiatan" readonly style="background:#f0f0f0;">

    <label>Sisa Anggaran</label>
    <input type="text" id="sisaAnggaran" readonly style="background:#f0f0f0;">

    <label>Rencana Biaya Total</label>
    <input type="text" id="rencanaBiayaTotal" placeholder="Contoh: 1.000.000" required>
    
    </form>
</main>

<script>
  let masterPegawai = [];

  // 1. Load Master Pegawai untuk Autocomplete
  async function initPegawaiData() {
    try {
      const res = await fetch("/.netlify/functions/pegawai_bun", {
        method: "POST",
        body: JSON.stringify({ limit: 1000 }) // Ambil semua data pegawai
      });
      const result = await res.json();
      if (result.success) {
        masterPegawai = result.rows;
        const list = document.getElementById("listPegawai");
        list.innerHTML = masterPegawai.map(p => `<option value="${p.nama_pegawai}">`).join("");
      }
    } catch (e) { console.error("Gagal muat pegawai", e); }
  }

  // 2. Event Listener untuk mengisi Golongan & Jabatan Otomatis
  document.getElementById("pegawaiWrapper").addEventListener("input", (e) => {
    if (e.target.classList.contains("nama-input-field")) {
      const parent = e.target.closest(".pegawai-group");
      const data = masterPegawai.find(p => p.nama_pegawai === e.target.value);
      if (data) {
        parent.querySelector(".golongan-field").value = data.golongan;
        parent.querySelector(".jabatan-field").value = data.jabatan;
      }
    }
  });

  // 3. Modifikasi fungsi Tambah Pegawai (agar include datalist)
  document.getElementById("addPegawaiBtn").addEventListener("click", () => {
    const wrapper = document.getElementById("pegawaiWrapper");
    const index = wrapper.children.length + 1;
    const newDiv = document.createElement("div");
    newDiv.className = "pegawai-group row-add-animation";
    newDiv.innerHTML = `
      <hr style="border-top:1px dashed #ccc; margin:15px 0;">
      <label>Nama Pegawai ke-${index}</label>
      <input type="text" class="nama-input-field" list="listPegawai" required autocomplete="off">
      <label>Golongan</label>
      <input type="text" class="golongan-field" readonly style="background:#f0f0f0;">
      <label>Jabatan</label>
      <input type="text" class="jabatan-field" readonly style="background:#f0f0f0;">
      <button type="button" class="removePegawaiBtn" style="background:#dc3545;color:white;padding:5px;border:none;border-radius:4px;margin-top:5px;">🗑️ Hapus</button>
    `;
    wrapper.appendChild(newDiv);
    
    newDiv.querySelector(".removePegawaiBtn").onclick = () => {
        newDiv.remove();
        updatePegawaiLabels();
    };
  });

  // 4. Integrasi Submit (Sesuaikan dengan data array)
  document.getElementById("perjadinForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    // ... (Logika upload Cloudinary Anda) ...

    const allPegawai = [...document.querySelectorAll(".pegawai-group")].map(g => ({
      nama: g.querySelector(".nama-input-field").value,
      golongan: g.querySelector(".golongan-field").value,
      jabatan: g.querySelector(".jabatan-field").value
    }));

    // Kirim data 'allPegawai' ke backend
  });

  window.onload = () => {
    initPegawaiData();
    loadKodeKegiatan(); // Fungsi load anggaran yang sudah Anda buat
  };
</script>
