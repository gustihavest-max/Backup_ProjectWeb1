<main class="form-container">
  <h2 class="form-title">Ajukan E-Perjadin 📝</h2>

  <form id="perjadinForm">
    <h3>Data Pegawai</h3>
    <div id="pegawaiWrapper">
      <div class="pegawai-group">
        <label>Nama Pegawai</label>
        <input type="text" class="nama-input-field" name="nama[]" placeholder="Contoh: Budianto, S.T" required />
        <label>Golongan</label>
        <select class="golongan-select-field" name="golongan[]" required>
          <option value="">-- Pilih Golongan --</option>
          </select>
        <label>Jabatan</label>
        <input type="text" class="jabatan-input-field" name="jabatan[]" required />
      </div>
    </div>
    <button type="button" id="addPegawaiBtn" style="margin-top: 10px;">➕ Tambah Pegawai</button>

    <hr />
    <h3>Detail Perjalanan Dinas</h3>
    <label>Tujuan</label>
    <input type="text" id="tujuan" required />

    <label>Maksud Perjalanan</label>
    <textarea id="maksud" rows="4" required></textarea>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
      <div>
        <label>Tanggal Berangkat</label>
        <div class="date-wrapper">
          <input type="text" id="tanggalBerangkat" class="date-picker" required />
          <span class="calendar-icon">📅</span>
        </div>
      </div>
      <div>
        <label>Tanggal Pulang</label>
        <div class="date-wrapper">
          <input type="text" id="tanggalPulang" class="date-picker" required />
          <span class="calendar-icon">📅</span>
        </div>
      </div>
    </div>

    <label>Lama Perjalanan</label>
    <input type="text" id="lamaPerjalanan" readonly />

    <label>Kendaraan</label>
    <input type="text" id="kendaraan" required />

    <hr />
    <h3>Kode Kegiatan & Penanggung Jawab</h3>

    <label>Pilih Kode Kegiatan (MAK)</label>
    <select id="kodeKegiatan" required>
      <option value="">-- Memuat Data Anggaran... --</option>
    </select>

    <label>Sisa Anggaran Tersedia</label>
    <input type="text" id="sisaAnggaran" readonly style="background:#f0f0f0; font-weight: bold; color: #059669;">

    <label>PJ (Penanggung Jawab)</label>
    <select id="pjKegiatan" required>
      <option value="">-- Pilih PJ --</option>
    </select>

    <label>Rencana Biaya Total (Rp)</label>
    <input type="text" id="rencanaBiayaTotal" placeholder="Contoh: 2.000.000" required />

    <hr />
    <h3>Upload Dokumen</h3>
    <label>Upload Rencana Biaya (PDF)</label>
    <input type="file" id="urlBiaya" accept=".pdf" required />

    <label>Upload Data Dukung (PDF)</label>
    <input type="file" id="urlDukung" accept=".pdf" required />

    <div id="uploadLoader" style="display:none; text-align:center;">
      <div class="progress-ring"></div>
      <div class="upload-text">Memproses Data...</div>
    </div>

    <button type="submit" id="submitBtn">💾 Simpan Data Pengajuan</button>
  </form>
</main>

<script>
  // Variabel Global
  const kodeKegiatanSelect = document.getElementById("kodeKegiatan");
  const pjSelect = document.getElementById("pjKegiatan");
  const sisaAnggaranInput = document.getElementById("sisaAnggaran");
  let dataAnggaranGlobal = [];

  // 1. Fungsi Ambil Data Anggaran saat halaman Load
  async function loadAnggaranData() {
    try {
      const res = await fetch("/.netlify/functions/anggaran", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "read" }) // Pastikan backend punya action 'read'
      });
      const result = await res.json();
      
      if (result.success) {
        dataAnggaranGlobal = result.data;
        
        // Isi dropdown Kode MAK
        kodeKegiatanSelect.innerHTML = '<option value="">-- Pilih Kode MAK --</option>';
        result.data.forEach(item => {
          const opt = document.createElement("option");
          opt.value = item.kode_kegiatan;
          opt.textContent = `${item.kode_kegiatan} - ${item.nama_kegiatan}`;
          kodeKegiatanSelect.appendChild(opt);
        });

        // Isi dropdown PJ (Unique values)
        const daftarPJ = [...new Set(result.data.map(item => item.pj))];
        pjSelect.innerHTML = '<option value="">-- Pilih PJ --</option>';
        daftarPJ.forEach(pj => {
          const opt = document.createElement("option");
          opt.value = pj;
          opt.textContent = pj;
          pjSelect.appendChild(opt);
        });
      }
    } catch (err) {
      showNotification("Gagal memuat data anggaran", "error");
    }
  }

  // 2. Event saat Kode MAK dipilih
  kodeKegiatanSelect.addEventListener("change", () => {
    const selected = dataAnggaranGlobal.find(item => item.kode_kegiatan === kodeKegiatanSelect.value);
    if (selected) {
      sisaAnggaranInput.value = formatRupiah(String(selected.sisa_anggaran));
      // Otomatis arahkan PJ sesuai MAK yang dipilih
      pjSelect.value = selected.pj;
    } else {
      sisaAnggaranInput.value = "";
    }
  });

  // 3. Modifikasi Submit Form (Hapus PJ Sub)
  document.getElementById("perjadinForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    
    // Validasi Sisa Anggaran
    const rencana = getBiayaNumeric();
    const sisa = parseInt(unformat(sisaAnggaranInput.value)) || 0;

    if (rencana > sisa) {
      showNotification("Saldo Anggaran Tidak Mencukupi!", "error");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Sedang Menyimpan...";

    try {
      const user = localStorage.getItem("loggedInUser");
      const names = [...document.querySelectorAll(".nama-input-field")].map(a => a.value);
      const gol = [...document.querySelectorAll(".golongan-select-field")].map(a => a.value);
      const jab = [...document.querySelectorAll(".jabatan-input-field")].map(a => a.value);

      const allPegawai = names.map((x, i) => ({ nama: x, golongan: gol[i], jabatan: jab[i] }));

      // Upload Files... (sama seperti kode lama Anda)
      const urlbiaya = await uploadPDFtoCloudinary(document.getElementById("urlBiaya").files[0]);
      const urldatadukung = await uploadPDFtoCloudinary(document.getElementById("urlDukung").files[0]);

      const body = {
        email_user: user,
        allPegawai,
        tujuan: document.getElementById("tujuan").value,
        maksud: document.getElementById("maksud").value,
        tanggal_berangkat: document.getElementById("tanggalBerangkat").value,
        tanggal_pulang: document.getElementById("tanggalPulang").value,
        lama_perjalanan: document.getElementById("lamaPerjalanan").value,
        kendaraan: document.getElementById("kendaraan").value,
        pj_kegiatan: pjSelect.value, // Hanya PJ utama
        urlbiaya,
        urldatadukung,
        rencanabiaya: rencana,
        kode_kegiatan: kodeKegiatanSelect.value
      };

      const res = await fetch("/.netlify/functions/simpan-perjadin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const result = await res.json();
      if (result.success) {
        showNotification("Pengajuan Berhasil Disimpan!", "success");
        setTimeout(() => location.href = "riwayat_perjadin.html", 2000);
      } else {
        throw new Error(result.message);
      }
    } catch (err) {
      showNotification(err.message, "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "💾 Simpan Data Pengajuan";
    }
  });

  // Load awal
  document.addEventListener("DOMContentLoaded", () => {
    loadAnggaranData();
    // Panggil fungsi init flatpickr Anda di sini...
  });

  // (Sertakan juga fungsi formatRupiah, unformat, getBiayaNumeric, dan uploadPDF dari kode asli Anda)
</script>
