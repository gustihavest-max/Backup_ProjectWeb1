<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data Pegawai BRMP</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="pegawai_bun.css">

  <style>
    .table-wrapper {
      width: 90% !important;
      margin: auto;
    }

    table tbody tr:hover {
      background: #e3f2ff !important;
      transform: scale(1.01);
      transition: 0.15s ease;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="navbar-left">
    <img src="img/Logo-Kementan.png" />
    <a href="https://perkebunan.brmp.pertanian.go.id/" class="navbar-title" target="_blank">
      BRMP PERKEBUNAN
    </a>
  </div>

  <nav class="navbar-right">
    <span id="userDisplay"></span>
    <a href="dashboard.html" class="dashboard-btn">⬅️ Dashboard</a>
  </nav>
</header>

<div class="page-header">
  <h1>👨‍💼 Data Pegawai BRMP Perkebunan</h1>
</div>

<!-- SEARCH -->
<div class="search-container">
  <input type="text" id="searchInput" placeholder="🔍 Cari NIP / Nama / Jabatan..." />
</div>

<div id="loader" class="loader"></div>

<div id="tabelContainer" class="hidden fade-in">
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>NIP</th>
          <th>Nama Pegawai</th>
          <th>Jabatan</th>
          <th>Golongan</th>
        </tr>
      </thead>
      <tbody id="tabelPegawai"></tbody>
    </table>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const user = localStorage.getItem("loggedInUser");
  if (!user) {
    alert("Silakan login terlebih dahulu.");
    window.location.href = "index.html";
    return;
  }

  document.getElementById("userDisplay").textContent = `👤 ${user}`;

  const loader = document.getElementById("loader");
  const tableContainer = document.getElementById("tabelContainer");
  const tbody = document.getElementById("tabelPegawai");

  try {
    // 🔥 sementara dummy data (nanti ganti backend)
    const data = [
      { nip: "198206282006042001", nama: "Nurya Yuniyati", jabatan: "Analis Keuangan", golongan: "III/c" },
      { nip: "198507152010012002", nama: "Budi Santoso", jabatan: "Staff Administrasi", golongan: "III/b" },
      { nip: "199001122015031001", nama: "Siti Aminah", jabatan: "Pengelola Data", golongan: "III/a" }
    ];

    loader.style.display = "none";
    tableContainer.classList.remove("hidden");

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5">Belum ada data pegawai.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map((row, index) => `
      <tr>
        <td>${index + 1}</td>
        <td>${row.nip}</td>
        <td>${row.nama}</td>
        <td>${row.jabatan}</td>
        <td>${row.golongan}</td>
      </tr>
    `).join("");

  } catch (err) {
    console.error(err);
    loader.style.display = "none";
    tableContainer.classList.remove("hidden");
    tbody.innerHTML = `<tr><td colspan="5">Error ambil data</td></tr>`;
  }
});

/* SEARCH FILTER */
document.getElementById("searchInput").addEventListener("keyup", () => {
  const keyword = document.getElementById("searchInput").value.toLowerCase();

  const rows = document.querySelectorAll("#tabelPegawai tr");

  rows.forEach(row => {
    const nip = row.children[1]?.textContent.toLowerCase() || "";
    const nama = row.children[2]?.textContent.toLowerCase() || "";
    const jabatan = row.children[3]?.textContent.toLowerCase() || "";

    const cocok =
      nip.includes(keyword) ||
      nama.includes(keyword) ||
      jabatan.includes(keyword);

    row.style.display = cocok ? "" : "none";
  });
});
</script>

</body>
</html>
