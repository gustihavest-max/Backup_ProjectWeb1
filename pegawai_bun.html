<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data Pegawai BRMP</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="pegawai_bun.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="navbar-left">
    <img src="img/Logo-Kementan.png" />
    <a href="https://perkebunan.brmp.pertanian.go.id/" class="navbar-title" target="_blank">
      BRMP PERKEBUNAN
    </a>
  </div>

  <nav class="navbar-right">
    <span id="userDisplay"></span>
    <a href="dashboard.html" class="dashboard-btn">⬅️ Dashboard</a>
  </nav>
</header>

<div class="page-header">
  <h1> <i class="fa-solid fa-user"></i> Data Pegawai BRMP Perkebunan</h1>
</div>

<!-- SEARCH -->
<div class="search-container">
  <input type="text" id="searchInput" placeholder="🔍 Cari NIP / Nama / Jabatan..." />
</div>

<!-- LOADER -->
<div id="loader" class="loader"></div>

<!-- TABLE -->
<div id="tabelContainer" class="hidden">
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>NIP</th>
          <th>Nama Pegawai</th>
          <th>Jabatan</th>
          <th>Golongan</th>
        </tr>
      </thead>
      <tbody id="tabelPegawai"></tbody>
    </table>
  </div>

  <!-- PAGINATION -->
  <div id="pagination" class="pagination"></div>
</div>

<script>
let currentPage = 1;
let currentSearch = "";
const limit = 10;
let delay;

/* ===== LOAD DATA ===== */
async function loadData(page = 1) {
  currentPage = page;

  const loader = document.getElementById("loader");
  const tbody = document.getElementById("tabelPegawai");
  const tableContainer = document.getElementById("tabelContainer");

  loader.style.display = "block";

  try {
    const res = await fetch('/.netlify/functions/pegawai_bun', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        page,
        limit,
        search: currentSearch
      })
    });

    const data = await res.json();
    console.log("DATA:", data);

    loader.style.display = "none";
    tableContainer.classList.remove("hidden");

    if (!data.success || data.rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5">Tidak ada data</td></tr>`;
      document.getElementById("pagination").innerHTML = "";
      return;
    }

    tbody.innerHTML = data.rows.map((row, index) => `
      <tr>
        <td>${(page - 1) * limit + index + 1}</td>
        <td>${row.nip}</td>
        <td>${row.nama_pegawai}</td>
        <td>${row.jabatan}</td>
        <td>${row.golongan}</td>
      </tr>
    `).join("");

    renderPagination(data.page, data.totalPages);

  } catch (err) {
    console.error("ERROR:", err);
    loader.style.display = "none";
  }
}

/* ===== PAGINATION ===== */
function renderPagination(current, total) {
  const container = document.getElementById("pagination");

  let html = "";

  if (current > 1) {
    html += `<button onclick="loadData(${current - 1})">⬅</button>`;
  }

  for (let i = 1; i <= total; i++) {
    html += `
      <button onclick="loadData(${i})"
        class="${i === current ? 'active' : ''}">
        ${i}
      </button>
    `;
  }

  if (current < total) {
    html += `<button onclick="loadData(${current + 1})">➡</button>`;
  }

  container.innerHTML = html;
}

/* ===== SEARCH (SERVER SIDE + DEBOUNCE) ===== */
document.getElementById("searchInput").addEventListener("keyup", (e) => {
  clearTimeout(delay);

  delay = setTimeout(() => {
    currentSearch = e.target.value;
    loadData(1); // reset ke halaman 1
  }, 400);
});

/* ===== INIT ===== */
document.addEventListener("DOMContentLoaded", () => {
  const user = localStorage.getItem("loggedInUser");

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  document.getElementById("userDisplay").textContent = `👤 ${user}`;

  loadData(1);
});
</script>

</body>
</html>
