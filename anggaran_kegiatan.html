<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Anggaran Kegiatan</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="anggaran_kegiatan.css"> 

</head>
<body>
    <header class="navbar">
        <div class="navbar-left">
            <img src="img/Logo-Kementan.png" alt="Logo Kementan" />
            <a href="https://perkebunan.brmp.pertanian.go.id/" class="navbar-title" target="_blank">
                BRMP PERKEBUNAN
            </a>
        </div>
        <nav class="navbar-right">
            <a href="dashboard.html" class="dashboard-btn">⬅️ Dashboard</a>
        </nav>
    </header>

    <div class="page-header">
        <h1>💸 Manajemen Anggaran Kegiatan</h1>
    </div>

    <div id="loader" class="loader"></div>
    <div id="statusMessage" class="hidden"></div> 

    <div id="tabelContainer" class="hidden fade-in">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Kode Kegiatan</th>
                        <th>Pagu Anggaran</th>
                        <th>Anggaran Digunakan</th>
                        <th>Sisa Anggaran</th>
                        <th>PJ Kegiatan</th>
                        <th>PJ Subkegiatan</th>
                        <th>Uraian Kegiatan</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelAnggaran">
                    </tbody>
            </table>
        </div>
    </div>
    
    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <h3>Edit Data Anggaran</h3>
            <form id="anggaranEditForm">
                <div class="form-group">
                    <label>Kode Kegiatan:</label>
                    <input type="text" id="edit_kode_kegiatan" disabled>
                </div>
                <div class="form-group">
                    <label>Pagu Anggaran:</label>
                    <input type="number" id="edit_pagu_anggaran" required>
                </div>
                <div class="form-group">
                    <label>Anggaran Digunakan:</label>
                    <input type="number" id="edit_anggaran_digunakan" required> 
                </div>
                <div class="form-group">
                    <label>PJ Kegiatan:</label>
                    <input type="text" id="edit_pj_kegiatan" required>
                </div>
                <div class="form-group">
                    <label>PJ Subkegiatan:</label>
                    <input type="text" id="edit_pj_subkegiatan">
                </div>
                <div class="form-group">
                    <label>Uraian Kegiatan:</label>
                    <textarea id="edit_uraian_kegiatan" required></textarea>
                </div>
                
                <button type="submit" class="primary-btn">Simpan Perubahan</button>
                <button type="button" id="closeModal" class="secondary-btn">Tutup</button>
            </form>
        </div>
    </div>
    
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
const API_ENDPOINT = "/.netlify/functions/anggaran";

document.addEventListener("DOMContentLoaded", () => {
    const loader = document.getElementById("loader");
    const tableContainer = document.getElementById("tabelContainer");
    const tbody = document.getElementById("tabelAnggaran");
    const editModal = document.getElementById("editModal");
    const closeModalBtn = document.getElementById("closeModal");
    const editForm = document.getElementById("anggaranEditForm");

    // Format Rupiah
    function formatRupiah(number) {
        const num = parseFloat(number) || 0;
        return new Intl.NumberFormat("id-ID", {
            style: "currency",
            currency: "IDR",
            minimumFractionDigits: 0
        }).format(num);
    }

    // 🎯 NOTIFIKASI — SweetAlert2
    function popupSuccess(msg) {
        Swal.fire({
            icon: "success",
            title: "Berhasil",
            html: msg,
            confirmButtonColor: "#3085d6"
        });
    }

    function popupError(msg) {
        Swal.fire({
            icon: "error",
            title: "Gagal",
            html: msg,
            confirmButtonColor: "#d33"
        });
    }

    // Wrapper API
    async function apiRequest(action, data = {}) {
        try {
            const response = await fetch(API_ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action, ...data })
            });

            const result = await response.json();

            // Popup untuk selain getAll
            if (action !== "getAll") {
                if (result.success) popupSuccess(result.message || "Operasi berhasil.");
                else popupError(result.message || "Operasi gagal.");
            }

            return result;

        } catch (error) {
            popupError("Tidak bisa menghubungi server.<br>" + error.message);
            return { success: false, message: "Network error" };
        }
    }

    // Ambil semua data
    async function fetchAllData() {
        loader.style.display = "block";
        tableContainer.classList.add("hidden");
        tbody.innerHTML = "";

        const result = await apiRequest("getAll");

        loader.style.display = "none";
        tableContainer.classList.remove("hidden");

        if (result.success && Array.isArray(result.data)) {
            renderTable(result.data);
        } else {
            tbody.innerHTML = `
                <tr>
                    <td colspan="9" class="text-center p-4 text-gray-500">
                        Gagal memuat data: ${result.message || 'Data tidak ditemukan.'}
                    </td>
                </tr>`;
        }
    }

    // Render tabel
    function renderTable(dataArray) {
        let counter = 1;

        tbody.innerHTML = dataArray.map(item => `
            <tr>
                <td>${counter++}</td>
                <td>${item.kode_kegiatan}</td>
                <td class="numeric">${formatRupiah(item.pagu_anggaran)}</td>
                <td class="numeric">${formatRupiah(item.anggaran_digunakan)}</td>
                <td class="numeric">${formatRupiah(item.sisa_anggaran)}</td>
                <td>${item.pj_kegiatan}</td>
                <td>${item.pj_subkegiatan || '-'}</td>
                <td>${item.uraian_kegiatan}</td>
                <td>
                    <button class="btn-edit" data-kode="${item.kode_kegiatan}">Edit</button>
                </td>
            </tr>
        `).join('');

        // Event tombol edit
        document.querySelectorAll(".btn-edit").forEach(btn => {
            btn.addEventListener("click", e => {
                const kode = e.target.getAttribute("data-kode");
                loadDataForEdit(kode);
            });
        });
    }

    // Ambil data untuk modal (getByKode)
    async function loadDataForEdit(kode) {
        const result = await apiRequest("getByKode", { kode_kegiatan: kode });

        if (result.success && result.data) {
            const data = result.data;

            document.getElementById("edit_kode_kegiatan").value = data.kode_kegiatan;
            document.getElementById("edit_pagu_anggaran").value = data.pagu_anggaran;
            document.getElementById("edit_anggaran_digunakan").value = data.anggaran_digunakan;
            document.getElementById("edit_pj_kegiatan").value = data.pj_kegiatan;
            document.getElementById("edit_pj_subkegiatan").value = data.pj_subkegiatan || "";
            document.getElementById("edit_uraian_kegiatan").value = data.uraian_kegiatan;

            editModal.classList.add("show");
        }
    }

    // Tutup modal
    closeModalBtn.addEventListener("click", () => {
        editModal.classList.remove("show");
        editForm.reset();
    });

    // Update data
    editForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
            kode_kegiatan: document.getElementById("edit_kode_kegiatan").value,
            pagu_anggaran: parseFloat(document.getElementById("edit_pagu_anggaran").value),
            anggaran_digunakan: parseFloat(document.getElementById("edit_anggaran_digunakan").value),
            pj_kegiatan: document.getElementById("edit_pj_kegiatan").value,
            pj_subkegiatan: document.getElementById("edit_pj_subkegiatan").value || null,
            uraian_kegiatan: document.getElementById("edit_uraian_kegiatan").value
        };

        const result = await apiRequest("update", payload);

        if (result.success) {
            editModal.classList.remove("show");
            fetchAllData();
        }
    });

    fetchAllData();
});
</script>


</body>
</html>
