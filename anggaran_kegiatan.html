<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manajemen Anggaran</title>

<link rel="stylesheet" href="anggaran_kegiatan.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<header class="navbar">
    <h2>💸 Manajemen Anggaran</h2>
</header>

<div class="container">

    <button id="btnTambah" class="primary-btn">➕ Tambah Data</button>

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Kode</th>
                <th>Pagu</th>
                <th>Digunakan</th>
                <th>Sisa</th>
                <th>PJ</th>
                <th>Uraian</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelAnggaran"></tbody>
    </table>

</div>

<!-- MODAL TAMBAH -->
<div id="modalTambah" class="modal">
<div class="modal-content">
<h3>Tambah Data</h3>

<form id="formTambah">
<input id="add_kode" placeholder="Kode Kegiatan" required>
<input id="add_pagu" type="number" placeholder="Pagu" required>
<input id="add_digunakan" type="number" placeholder="Digunakan">
<input id="add_pj" placeholder="PJ" required>
<textarea id="add_uraian" placeholder="Uraian"></textarea>

<button type="submit">Simpan</button>
<button type="button" onclick="closeModal()">Batal</button>
</form>
</div>
</div>

<!-- MODAL EDIT -->
<div id="modalEdit" class="modal">
<div class="modal-content">
<h3>Edit Data</h3>

<form id="formEdit">
<input id="edit_kode" disabled>
<input id="edit_pagu" type="number">
<input id="edit_digunakan" type="number">
<input id="edit_pj">
<textarea id="edit_uraian"></textarea>

<button type="submit">Update</button>
<button type="button" onclick="closeEdit()">Batal</button>
</form>
</div>
</div>

<script>
const API = "/.netlify/functions/anggaran";
const tbody = document.getElementById("tabelAnggaran");

/* ================= FETCH ================= */
async function api(action, data={}) {
    const res = await fetch(API, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({action,...data})
    });
    return res.json();
}

/* ================= LOAD ================= */
async function loadData() {
    const res = await api("getAll");

    tbody.innerHTML = res.data.map((d,i)=>`
    <tr>
        <td>${i+1}</td>
        <td>${d.kode_kegiatan}</td>
        <td>${format(d.pagu_anggaran)}</td>
        <td>${format(d.anggaran_digunakan)}</td>
        <td>${format(d.sisa_anggaran)}</td>
        <td>${d.pj_kegiatan}</td>
        <td>${d.uraian_kegiatan}</td>
        <td>
            <button onclick="openEdit('${d.kode_kegiatan}')">Edit</button>
            <button onclick="hapus('${d.kode_kegiatan}')">Hapus</button>
        </td>
    </tr>
    `).join("");
}

/* ================= FORMAT ================= */
function format(num){
    return new Intl.NumberFormat("id-ID").format(num);
}

/* ================= TAMBAH ================= */
document.getElementById("btnTambah").onclick = ()=>{
    document.getElementById("modalTambah").style.display="flex";
}

function closeModal(){
    document.getElementById("modalTambah").style.display="none";
}

document.getElementById("formTambah").onsubmit = async (e)=>{
    e.preventDefault();

    const data = {
        kode_kegiatan:add_kode.value,
        pagu_anggaran:+add_pagu.value,
        anggaran_digunakan:+add_digunakan.value||0,
        pj_kegiatan:add_pj.value,
        uraian_kegiatan:add_uraian.value
    };

    const res = await api("insert", data);

    Swal.fire("Sukses", res.message, "success");
    closeModal();
    loadData();
};

/* ================= EDIT ================= */
async function openEdit(kode){
    const res = await api("getByKode",{kode_kegiatan:kode});
    const d = res.data;

    edit_kode.value=d.kode_kegiatan;
    edit_pagu.value=d.pagu_anggaran;
    edit_digunakan.value=d.anggaran_digunakan;
    edit_pj.value=d.pj_kegiatan;
    edit_uraian.value=d.uraian_kegiatan;

    modalEdit.style.display="flex";
}

function closeEdit(){
    modalEdit.style.display="none";
}

document.getElementById("formEdit").onsubmit = async (e)=>{
    e.preventDefault();

    const data = {
        kode_kegiatan:edit_kode.value,
        pagu_anggaran:+edit_pagu.value,
        anggaran_digunakan:+edit_digunakan.value,
        pj_kegiatan:edit_pj.value,
        uraian_kegiatan:edit_uraian.value
    };

    const res = await api("update", data);

    Swal.fire("Update", res.message, "success");
    closeEdit();
    loadData();
};

/* ================= DELETE ================= */
async function hapus(kode){
    const ok = confirm("Hapus data?");
    if(!ok) return;

    const res = await api("delete",{kode_kegiatan:kode});
    alert(res.message);
    loadData();
}

loadData();
</script>

</body>
</html>
